<div class="song-card" (click)="openSong()">


    <div class="track-number">
        {{ trackNumber }}
    </div>


    <div class="song-info">

        <h1 class="song-name">
            {{ song.name }}
        </h1>


        <p class="song-artist">
            {{ 'Track' }}
        </p>

    </div>


</div>
