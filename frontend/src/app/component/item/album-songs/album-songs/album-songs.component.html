<div class="song-row" (click)="openSong()">

    <span class="track-number">
        {{ trackNumber }}
    </span>

    <div class="song-info">

        <h3 class="song-name">
            {{ song.name }}
        </h3>

        <p class="song-artists" *ngIf="song.artists?.length">
            {{ song.artists.join(', ') }}
        </p>

    </div>

    <span class="song-duration">
        {{ formatDuration(song.durationMs) }}
    </span>

</div>
