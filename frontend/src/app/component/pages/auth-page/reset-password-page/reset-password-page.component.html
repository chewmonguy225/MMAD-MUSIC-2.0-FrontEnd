<app-auth-page title="Secure your account." subtitle="Choose a new password and keep listening."
    image="https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=1974&auto=format&fit=crop">

    <form>

        <h3>Reset Password</h3>

        <p class="subtitle">
            Enter your verification code and create a new password.
        </p>

        <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="success-message">
            {{ successMessage }}
        </div>

        <div *ngIf="resendMessage" class="success-message">
            {{ resendMessage }}
        </div>

        <div class="input-group">

            <label>Email</label>

            <input name="email" [(ngModel)]="email" type="email" readonly />

        </div>

        <div class="input-group">

            <label>Reset Code</label>

            <input name="code" [(ngModel)]="code" type="text" required />

        </div>

        <app-password-input label="New Password" name="newPassword" [(value)]="newPassword">
        </app-password-input>

        <app-password-input label="Confirm Password" name="confirmPassword" [(value)]="confirmPassword">
        </app-password-input>

        <app-password-rules [password]="newPassword">
        </app-password-rules>

        <button type="button" (click)="resetPassword()">
            Reset Password
        </button>

        <p class="switch-text">

            Didn't receive the code?

            <a *ngIf="!resendDisabled" (click)="resendCode()">
                Resend code
            </a>

            <span *ngIf="resendDisabled">
                Resend available in {{ resendCooldown }}s
            </span>

        </p>

        <p class="switch-text">

            Remember your password?

            <a (click)="goToLogin()">
                Login here
            </a>

        </p>

    </form>

</app-auth-page>
