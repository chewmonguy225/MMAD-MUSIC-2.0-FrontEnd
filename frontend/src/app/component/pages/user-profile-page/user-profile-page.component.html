<div class="profile-header" *ngIf="user as u">

  <div class="profile-info">

    <h2 class="username">
      {{ u.username }}
    </h2>

    <div class="stats">

      <span>
        Reviews: {{ reviews?.length || 0 }}
      </span>


      <button 
        mat-button
        (click)="openUserList('Followers', u.followers || [])">
        Followers: {{ u.followers?.length || 0 }}
      </button>


      <button 
        mat-button
        (click)="openUserList('Following', u.following || [])">
        Following: {{ u.following?.length || 0 }}
      </button>


      <!-- Follow / Unfollow -->
      <ng-container *ngIf="currentUser && currentUser.username !== u.username">

        <button 
          mat-button
          *ngIf="!isFollowing"
          (click)="follow()">
          Follow
        </button>


        <button 
          mat-button
          *ngIf="isFollowing"
          (click)="unfollow()">
          Unfollow
        </button>

      </ng-container>

    </div>

  </div>

</div>


<!-- Reviews -->
<app-review-viewer
  [reviews]="reviews ?? []"
  [isLoading]="isLoading"
  [cardComponent]="cardComponent"
  [errorMessage]="errorMessage"
  (refresh)="user && loadReviews(user.username)">
</app-review-viewer>
