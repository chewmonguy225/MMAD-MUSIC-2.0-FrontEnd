<section class="auth-page">

    <div class="auth-container">
  
      <!-- LEFT SIDE -->
      <div class="auth-panel">
  
        <div class="logo">
          <i class="fa fa-compact-disc"></i>
          <span>MMAD Music</span>
        </div>
  
  
        <div class="form-container">
  
          <form>
  
            <h3>Forgot Password</h3>
  
            <p class="subtitle">
              Enter your email and we will send you a password reset code.
            </p>
  
  
            <div *ngIf="errorMessage" class="error-message">
              {{ errorMessage }}
            </div>
  
  
            <div *ngIf="successMessage" class="success-message">
              {{ successMessage }}
            </div>
  
  
            <div class="input-group">
  
              <label>Email</label>
  
              <input
                name="email"
                [(ngModel)]="email"
                type="email"
                required />
  
            </div>
  
  
            <button
              type="button"
              (click)="sendCode()">
  
              Send Reset Code
  
            </button>
  
  
            <p class="switch-text">
  
              Remember your password?
  
              <a (click)="router.navigate(['/login'])">
                Login here
              </a>
  
            </p>
  
  
          </form>
  
  
        </div>
  
  
      </div>
  
  
      <!-- RIGHT SIDE -->
      <div class="image-panel">
  
        <img
          src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?q=80&w=1974&auto=format&fit=crop"
          alt="Music" />
  
        <div class="overlay"></div>
  
  
        <div class="quote">
  
          <h1>
            Get back
            <br>
            to your music.
          </h1>
  
  
          <p>
            Reset your password and continue discovering.
          </p>
  
  
        </div>
  
  
      </div>
  
  
    </div>
  
  </section>
