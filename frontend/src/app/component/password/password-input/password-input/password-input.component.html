<div class="input-group">

  <label>{{ label }}</label>

  <div class="password-wrapper">

    <input
      [name]="name"
      [value]="value"
      (input)="updateValue($event)"
      [type]="showPassword ? 'text' : 'password'"
    />

    <button
      type="button"
      class="eye-button"
      (click)="showPassword = !showPassword">

      <i 
        class="fa"
        [class.fa-eye]="!showPassword"
        [class.fa-eye-slash]="showPassword">
      </i>

    </button>

  </div>

</div>
