<!-- FILTERS -->
<div class="filter-group">

  <button type="button" (click)="toggleType('artist')" [class.active]="isTypeSelected('artist')">
    Artists
  </button>

  <button type="button" (click)="toggleType('album')" [class.active]="isTypeSelected('album')">
    Albums
  </button>

  <button type="button" (click)="toggleType('song')" [class.active]="isTypeSelected('song')">
    Songs
  </button>

  <button *ngIf="includeUsers" type="button" (click)="toggleType('user')" [class.active]="isTypeSelected('user')">
    Users
  </button>

</div>


<!-- SEARCH BAR -->
<div class="search-bar">

  <input type="text" [value]="searchQuery" (input)="onSearchInput($event)" placeholder="Search..." />

  <button *ngIf="searchQuery" type="button" class="clear-btn" (click)="clearSearch()" aria-label="Clear search input">
    ×
  </button>

</div>


<!-- RESULTS -->
<div *ngIf="searchQuery && results.length > 0" class="results-container">

  <div class="results-scroll">

    <div class="item-list">

      <ng-container *ngFor="let item of results">

        <div class="result-item" (click)="selectItem(item)">


          <app-item-card *ngIf="item.type !== 'user'" [item]="item" [navigateOnClick]="navigateOnItemSelect">
          </app-item-card>


          <ng-container *ngIf="item.type === 'user' && userCache.get(item.name) as user">

            <app-user-card [user]="user">
            </app-user-card>

          </ng-container>


        </div>

      </ng-container>

    </div>

  </div>

</div>


<!-- NO RESULTS -->
<div *ngIf="searchQuery && !isSearching && results.length === 0" class="empty-results">

  No results found

</div>
