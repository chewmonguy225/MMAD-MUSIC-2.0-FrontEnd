<header>

    <a routerLink="/home" class="record-icon" title="Record">
        <svg xmlns="http://www.w3.org/2000/svg" height="32" viewBox="0 0 512 512" fill="white">
            <path
                d="M0 256a256 256 0 1 1 512 0A256 256 0 1 1 0 256zm256 32a32 32 0 1 1 0-64 32 32 0 1 1 0 64zm-96-32a96 96 0 1 0 192 0 96 96 0 1 0 -192 0zM96 240c0-35 17.5-71.1 45.2-98.8S205 96 240 96c8.8 0 16-7.2 16-16s-7.2-16-16-16c-45.4 0-89.2 22.3-121.5 54.5S64 194.6 64 240c0 8.8 7.2 16 16 16s16-7.2 16-16z" />
        </svg>
    </a>

    <nav>

        <!-- Home -->
        <a routerLink="/home" routerLinkActive="active-link" title="Home">
            <i class="fa fa-home"></i>
        </a>

        <!-- Explore -->
        <a routerLink="/explore" routerLinkActive="active-link" title="Explore">
            <i class="fa fa-compass"></i>
        </a>

        <!-- Search -->
        <a title="Search" (click)="toggleSearch()" [class.active-link]="searchActive" role="button" tabindex="0">
            <i class="fa fa-search"></i>
        </a>

        <!-- Plus (MODAL TRIGGER) -->
        <a (click)="openModal()" title="Add">
            <i class="fa fa-plus"></i>
        </a>

        <!-- Profile -->
        <span *ngIf="currentUsername(); else defaultProfile" [routerLink]="['/profile/', currentUsername()]"
            routerLinkActive="active-link" title="Profile">
            <i class="fa fa-user"></i>
        </span>

        <ng-template #defaultProfile>
            <i class="fa fa-user" title="Profile"></i>
        </ng-template>

    </nav>

</header>

<!-- SEARCH -->
<div class="search-panel" [class.visible]="searchActive">
    <app-search-bar *ngIf="searchActive"></app-search-bar>
</div>

<!-- MODAL -->
<div class="modal-overlay" *ngIf="isModalOpen" (click)="closeModal()">
    <div class="modal-box" (click)="$event.stopPropagation()">
        <button class="modal-close" (click)="closeModal()">×</button>
        <h2>Add Content</h2>
        <p>Select what you want to add</p>
        <button (click)="closeModal()">Close</button>
    </div>
</div>
