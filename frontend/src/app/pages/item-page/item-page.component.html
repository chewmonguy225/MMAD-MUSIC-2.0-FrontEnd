<div class="page-layout">

  <!-- LEFT SIDE -->
  <section class="main">

    <div *ngIf="item" class="item-header">

      <img [src]="item.imageURL" [alt]="item.name" class="item-image">

      <div class="item-info">

        <h1>{{ item.name }}</h1>

        <button class="review-btn" (click)="openReviewModal()">
          Write a Review
        </button>

      </div>

    </div>

    <!-- REVIEWS -->
    <app-review-viewer [reviews]="reviews" [cardComponent]="cardComponent" [isLoading]="isLoading"
      [errorMessage]="errorMessage">
    </app-review-viewer>

  </section>


  <!-- RIGHT SIDE -->
  <section class="side">

    <!-- Box 1 -->
    <div class="side-box">
      <h3>Top Tracks</h3>
      <p>Content goes here</p>
    </div>

    <!-- Box 2 -->
    <div class="side-box">
      <h3>Related</h3>
      <p>Content goes here</p>
    </div>

  </section>

</div>
