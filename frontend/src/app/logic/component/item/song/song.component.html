<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

<div class="item-card">
    <!-- Clickable image -->
    <img [src]="item?.getImageURL()" alt="Song Cover" style="width: 100%; cursor: pointer" />

    <!-- Song title -->
    <h1>{{ item?.getName() }}</h1>

    <!-- Display artists -->
    <ng-container *ngIf="item?.getArtists() as artists">
        <p *ngIf="artists.length > 0">
            <strong>By:</strong>
            <span *ngFor="let artist of artists; let last = last">
                {{ artist.getName() }}<span *ngIf="!last">, </span>
            </span>
        </p>
    </ng-container>

    <ng-container *ngIf="item?.getAlbum() as album">
        <p>
            <strong>Album:</strong> {{ album.getName() }}
        </p>
    </ng-container>


    <!-- Spotify and Apple icons -->
    <a href="#" (click)="onSpotifyClick()"><i class="fa fa-spotify"></i></a>
    <a href="#"><i class="fa fa-apple"></i></a>
</div>
