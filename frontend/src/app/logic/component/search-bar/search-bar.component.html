<!-- Search Bar -->
<div class="search-bar">
  <input type="text" [value]="searchQuery" (input)="onSearchInput($event)" placeholder="Search..." />
  <button type="button" class="clear-btn" (click)="searchQuery = ''" aria-label="Clear search input">×</button>
</div>

<div class="search-type-buttons">
  <button (click)="searchArtist()">Artist</button>
  <button (click)="searchAlbum()">Album</button>
  <button (click)="searchSong()">Song</button>
  <button (click)="searchUser()">User</button>
  <button (click)="searchAll()">All</button>

</div>

<!-- Results Display -->
<div *ngIf="(searchType === 'user' ? displayedUserResults.length : displayedItems.length) > 0; else noResults">
  <div class="item-list">
    <!-- Item Results -->
    <ng-container *ngIf="searchType !== 'user'">
      <ng-container *ngFor="let item of displayedItems">
        <app-artist *ngIf="isArtist(item)" [item]="item"></app-artist>
        <app-album *ngIf="isAlbum(item)" [item]="item"></app-album>
        <app-song *ngIf="isSong(item)" [item]="item"></app-song>
      </ng-container>
    </ng-container>

    <!-- User Results -->
    <ng-container *ngIf="searchType === 'user'">
      <ng-container *ngFor="let user of displayedUserResults">
        <app-user-card [user]="user"></app-user-card>
      </ng-container>
    </ng-container>

  </div>

  <!-- Pagination Controls -->
  <div class="pagination-controls">
    <button type="button" (click)="prevPage()" [disabled]="currentPage === 1">
      Previous
    </button>
    <span>Page {{ currentPage }} of {{ getTotalPages() }}</span>
    <button type="button" (click)="nextPage()"
      [disabled]="currentPage * itemsPerPage >= (searchType === 'user' ? userResults.length : results.length)">
      Next
    </button>
  </div>
</div>

<!-- No Results Template -->
<ng-template #noResults>
  <div *ngIf="(searchType === 'user' ? userResults.length : results.length) === 0">
    No {{ searchType }}s found. Try another search.
  </div>
</ng-template>
