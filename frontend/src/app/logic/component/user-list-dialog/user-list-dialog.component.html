<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <ul *ngIf="data.users?.length; else noUsers">
    <li *ngFor="let user of data.users">
      <button mat-button (click)="goToProfile(user)">{{ user }}</button>
    </li>
  </ul>
  <ng-template #noUsers>No users found.</ng-template>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Close</button>
</mat-dialog-actions>
